on:
  push:
    branches: main
    paths-ignore:
      - "docs/**"
      - "**.md"
  pull_request:
    types: [opened, synchronize, reopened]
    branches: main

name: 🤖 GDExtension

jobs:
  build:
    name: 🏗️ Build / ${{ matrix.platform.os-name }}
    strategy:
      matrix:
        platform:
          - os-name: 🐧 Linux (64-bit)
            runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os-name: 🍎 macOS (Universal)
            runs-on: macos-latest
            target: universal-apple-darwin
          - os-name: 🪟 Windows (64-bit)
            runs-on: windows-latest
            target: x86_64-pc-windows-msvc
          - os-name: 🤖 Android (arm64)
            runs-on: ubuntu-latest
            target: aarch64-linux-android
          - os-name: 🤖 Android (arm32)
            runs-on: ubuntu-latest
            target: armv7-linux-androideabi
    runs-on: ${{ matrix.platform.runs-on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: ${{ matrix.platform.runs-on == 'ubuntu-latest' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install Android NDK
        if: ${{ contains(matrix.platform.target, 'android') }}
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        if: ${{ matrix.platform.runs-on != 'windows-latest' }}
        with:
          targets: ${{ matrix.platform.target == 'universal-apple-darwin' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.platform.target }}

      - name: Install Just
        uses: extractions/setup-just@v1

      - name: Build binaries
        shell: bash
        env:
          # نحدد الـ Linker الخاص بـ Android لضمان استخدام clang الصحيح لكل معمارية
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER: aarch64-linux-android34-clang
          CARGO_TARGET_ARMV7_LINUX_ANDROIDEABI_LINKER: armv7a-linux-androideabi34-clang
        run: |
          TARGET="${{ matrix.platform.target }}"
          
          if [[ "$TARGET" == *"android"* ]]; then
            just _build-android $TARGET
            just _copy-to-godot-android $TARGET
          elif [[ "$TARGET" == *"windows"* ]]; then
            just _build-windows $TARGET
            just _copy-to-godot-windows $TARGET
          elif [[ "$TARGET" == "universal-apple-darwin" ]]; then
            just build-macos-universal
          else
            # للحالات الافتراضية مثل Linux
            just _build-linux $TARGET
            just _copy-to-godot-linux $TARGET
          fi




      - name: Code sign and notarize library
        if: ${{ false }} # هذا التعديل سيجعل النظام يتجاهل هذه الخطوة ويُكمل العمل
        env:
          APPLE_CERT_BASE64: ${{ secrets.APPLE_CERT_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_DEV_ID: ${{ secrets.APPLE_DEV_ID }}
          APPLE_DEV_TEAM_ID: ${{ secrets.APPLE_DEV_TEAM_ID }}
          APPLE_DEV_PASSWORD: ${{ secrets.APPLE_DEV_PASSWORD }}
          APPLE_DEV_APP_ID: ${{ secrets.APPLE_DEV_APP_ID }}
        run: |
          brew install powershell
          pwsh ./scripts/ci_sign_macos.ps1 godot/addons/godot_wry/bin/universal-apple-darwin/libgodot_wry.framework

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.target }}
          path: |
            godot/addons/godot_wry/bin/${{ matrix.platform.target }}

  zip:
    name: 📦 Package
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: godot/addons/godot_wry/bin

      - name: Clean files
        run: |
          mkdir -p package/godot_wry
          mv godot/addons package/godot_wry

      - name: Debug paths
        run: ls -R godot/addons/godot_wry/bin/
        

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: godot_wry
          path: package
