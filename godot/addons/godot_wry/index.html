<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden; /* لمنع ظهور أشرطة التمرير غير الضرورية */
    }

    h1 {
      color: tomato;
      border: 1px dashed tomato;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue",
        sans-serif;
    }

    h1.is-focused {
      color: greenyellow;
    }
  </style>
</head>
<body>
  <h1>Hello res://!</h1>
  <script>
    (() => {
      setInterval(() => {
        if (document.hasFocus()) {
          document.querySelector("h1").classList.add("is-focused");
          return;
        }
        document.querySelector("h1").classList.remove("is-focused");
      }, 100);
    })();
  </script>
</body>
</html>
